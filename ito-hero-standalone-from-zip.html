<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ito QA Hero Animation</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --background: #f8f8f8;
        --foreground: #141414;
        --border: #e5e5e5;
        --font-body: "Inter", Arial, Helvetica, sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        min-height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background-color: var(--background);
        color: var(--foreground);
        font-family: var(--font-body);
        line-height: 1.5;
        overflow-x: hidden;
      }

      button {
        font: inherit;
        color: inherit;
      }

.ito-hero-shell {
  width: 100%;
  padding: 24px;
  background: #f8f8f8;
}

.ito-hero-frame {
  width: min(1280px, 100%);
  margin: 0 auto;
  background: #fff;
  border: 1px solid #e7e7e7;
  border-radius: 20px;
  overflow: hidden;
}

.ito-hero-topbar,
.ito-hero-bottombar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 18px;
  background: #fcfcfc;
  border-bottom: 1px solid #efefef;
  font-size: 11px;
  line-height: 1;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #666;
}

.ito-hero-bottombar {
  border-bottom: 0;
  border-top: 1px solid #efefef;
}

.ito-kicker {
  font-weight: 600;
  color: #111;
}

.ito-live,
.ito-connected,
.ito-status-left,
.ito-run-meta,
.ito-bottom-right {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.ito-live-dot,
.ito-connected i,
.ito-run-spinner,
.ito-mini.active,
.ito-spinner-ring {
  display: inline-block;
  border-radius: 999px;
}

.ito-live-dot,
.ito-connected i {
  width: 8px;
  height: 8px;
  background: #16a34a;
  box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
}

.ito-hero-grid {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr) 280px;
  min-height: 620px;
}

.ito-col {
  min-width: 0;
  padding: 18px;
}

.ito-col-left,
.ito-col-center {
  border-right: 1px solid #efefef;
}

.ito-col-head,
.ito-col-head-split {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #666;
  font-weight: 600;
}

.ito-head-progress {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 10px;
  color: #888;
}

.ito-pr-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.ito-pr-card,
.ito-pr-skeleton {
  display: flex;
  gap: 12px;
  padding: 12px;
  border: 1px solid #ececec;
  border-radius: 14px;
  background: #fff;
  transition:
    transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    background-color 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.ito-pr-icon {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  background: #f3f3f3;
  color: #111;
  font-size: 15px;
  flex: 0 0 auto;
}

.ito-pr-body {
  min-width: 0;
  flex: 1;
}

.ito-pr-title {
  font-size: 13px;
  line-height: 1.35;
  font-weight: 600;
  color: #111;
}

.ito-pr-branch,
.ito-pr-meta,
.ito-pr-footer {
  font-size: 11px;
  color: #777;
}

.ito-pr-branch {
  margin-top: 2px;
}

.ito-pr-meta,
.ito-pr-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 8px;
}

.ito-progress {
  position: relative;
  width: 100%;
  height: 6px;
  background: #f1f1f1;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
}

.ito-progress > span {
  position: absolute;
  inset: 0 auto 0 0;
  width: 58%;
  border-radius: inherit;
  background: linear-gradient(90deg, #111 0%, #666 100%);
  transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
}

.ito-progress-short {
  width: 84px;
  margin-top: 0;
}

.ito-pr-skeleton-dot {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: linear-gradient(90deg, #f1f1f1 25%, #fafafa 50%, #f1f1f1 75%);
  background-size: 200% 100%;
  animation: ito-shimmer 1.5s linear infinite;
  flex: 0 0 auto;
}

.ito-pr-skeleton-lines {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: center;
}

.ito-pr-skeleton-lines span {
  display: block;
  height: 10px;
  border-radius: 999px;
  background: linear-gradient(90deg, #f1f1f1 25%, #fafafa 50%, #f1f1f1 75%);
  background-size: 200% 100%;
  animation: ito-shimmer 1.5s linear infinite;
}

.ito-pr-skeleton-lines span:first-child {
  width: 65%;
}

.ito-pr-skeleton-lines span:last-child {
  width: 40%;
}

.ito-run-meta {
  margin-top: 14px;
  font-size: 11px;
  color: #777;
}

.ito-run-spinner {
  width: 10px;
  height: 10px;
  border: 2px solid #d8d8d8;
  border-top-color: #111;
  animation: itoSpinSmooth 1.2s linear infinite;
}

.ito-timeline {
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-height: 500px;
  overflow: hidden;
  padding-right: 4px;
  scrollbar-width: none;
  -ms-overflow-style: none;
  scroll-behavior: smooth;
}

.ito-timeline::-webkit-scrollbar {
  display: none;
}

.ito-step {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr);
  gap: 12px;
  align-items: start;
}

.ito-step-rail {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100%;
}

.ito-step-dot {
  width: 14px;
  height: 14px;
  border-radius: 999px;
  background: #e7e7e7;
  border: 1px solid #d8d8d8;
  flex: 0 0 auto;
}

.ito-step-dot.is-pass,
.ito-step-dot.is-fail,
.ito-step-dot.is-active {
  display: grid;
  place-items: center;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  border: 0;
}

.ito-step-dot.is-pass {
  background: #16a34a;
}

.ito-step-dot.is-fail {
  background: #dc2626;
}

.ito-step-dot.is-active {
  background: #111;
  position: relative;
}

.ito-spinner-ring {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-top-color: #fff;
  animation: itoSpinSmooth 1.2s linear infinite;
}

.ito-step-line {
  width: 1px;
  flex: 1 1 auto;
  min-height: 42px;
  background: #ececec;
  margin-top: 6px;
  transition: background-color 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.ito-step-line.is-done {
  background: #cfcfcf;
}

.ito-step-card {
  border: 1px solid #ececec;
  border-radius: 16px;
  padding: 14px;
  background: #fff;
  transition:
    opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.6s cubic-bezier(0.22, 1, 0.36, 1),
    background-color 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: transform, opacity;
  transform: translateY(0) scale(1);
}

.ito-step-card.is-active {
  border-color: #111;
  transform: translateY(-2px) scale(1.01);
}

.ito-step-card.is-dim {
  opacity: 0.42;
  transform: translateY(6px) scale(0.985);
}

.ito-step-card.is-fail {
  border-color: #fecaca;
  background: #fffafa;
}

.ito-step-top,
.ito-step-title-wrap,
.ito-step-status,
.ito-report-row,
.ito-report-left,
.ito-report-right,
.ito-report-summary-top,
.ito-report-summary-bottom,
.ito-metrics {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.ito-step-title-wrap,
.ito-report-left {
  justify-content: flex-start;
  min-width: 0;
}

.ito-step-icon,
.ito-mini {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: #f1f1f1;
  color: #666;
  font-size: 11px;
  flex: 0 0 auto;
}

.ito-step-icon.is-pass,
.ito-mini.pass {
  background: #f0fdf4;
  color: #16a34a;
}

.ito-step-icon.is-fail,
.ito-mini.fail {
  background: #fef2f2;
  color: #dc2626;
}

.ito-step-icon-running {
  background: #111;
  position: relative;
}

.ito-step-icon-running::after {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 999px;
  border: 2px solid rgba(255, 255, 255, 0.25);
  border-top-color: #fff;
  animation: itoSpinSmooth 1.2s linear infinite;
}

.ito-step-title {
  min-width: 0;
  font-size: 13px;
  font-weight: 600;
  color: #111;
  line-height: 1.35;
}

.ito-step-status {
  font-size: 11px;
  color: #777;
  flex: 0 0 auto;
}

.ito-step-status .is-pass,
.ito-report-right .is-pass,
.ito-metrics .is-pass {
  color: #16a34a;
}

.ito-step-status .is-fail,
.ito-report-right .is-fail,
.ito-metrics .is-fail {
  color: #dc2626;
}

.ito-step-sub {
  margin-top: 7px;
  font-size: 12px;
  line-height: 1.5;
  color: #666;
}

.ito-step-sub.is-error {
  color: #b91c1c;
}

.ito-step-expand {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #f1f1f1;
  animation: itoFadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  transform-origin: top center;
}

.ito-shot-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.ito-shot {
  width: 46px;
  height: 32px;
  border-radius: 9px;
  border: 1px solid rgba(0, 0, 0, 0.06);
  display: grid;
  place-items: center;
  position: relative;
  transition:
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.ito-step.is-active .ito-shot {
  transform: translateY(-1px);
}

.ito-shot.blue {
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
}

.ito-shot.green {
  background: linear-gradient(135deg, #dcfce7, #bbf7d0);
}

.ito-shot.red {
  background: linear-gradient(135deg, #fee2e2, #fecaca);
}

.ito-shot.purple {
  background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
}

.ito-shot.error {
  background: linear-gradient(135deg, #111111, #333333);
}

.ito-shot-error-label {
  font-size: 9px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #fff;
}

.ito-code {
  margin: 0;
  padding: 12px;
  border-radius: 12px;
  background: #fafafa;
  border: 1px solid #f0f0f0;
  overflow: auto;
  font-size: 11px;
  line-height: 1.5;
  color: #333;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

.ito-statusbar {
  margin-top: 16px;
  padding: 12px 14px;
  border: 1px solid #ececec;
  border-radius: 14px;
  background: #fcfcfc;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 11px;
  color: #666;
  transition:
    transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    background-color 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.ito-report-summary {
  padding: 14px;
  border: 1px solid #ececec;
  border-radius: 16px;
  background: #fcfcfc;
  transition:
    transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    background-color 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.ito-report-summary-top strong {
  font-size: 22px;
  line-height: 1;
  color: #111;
}

.ito-report-summary-top,
.ito-report-summary-bottom {
  font-size: 11px;
  color: #777;
}

.ito-report-summary-bottom {
  margin-top: 10px;
}

.ito-report-list {
  margin-top: 14px;
  border: 1px solid #ececec;
  border-radius: 16px;
  overflow: hidden;
  background: #fff;
}

.ito-report-row {
  padding: 12px 14px;
  border-bottom: 1px solid #f1f1f1;
  transition:
    opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
    background-color 0.45s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.ito-report-row:last-child {
  border-bottom: 0;
}

.ito-report-row.is-muted {
  opacity: 0.45;
  transform: translateY(2px);
}

.ito-report-row.is-current {
  background: #fcfcfc;
  transform: translateY(-1px);
}

.ito-report-left,
.ito-report-right {
  font-size: 12px;
  color: #555;
}

.ito-report-footer {
  margin-top: 14px;
}

.ito-metrics {
  border: 1px solid #ececec;
  border-radius: 16px;
  overflow: hidden;
  background: #fff;
  transition:
    transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    background-color 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.ito-metrics > div {
  flex: 1 1 0;
  padding: 14px 12px;
  text-align: center;
}

.ito-metrics > div.is-bordered {
  border-left: 1px solid #efefef;
  border-right: 1px solid #efefef;
}

.ito-metrics p {
  font-size: 11px;
  color: #777;
  margin-bottom: 4px;
}

.ito-metrics strong {
  font-size: 18px;
  line-height: 1;
  color: #111;
}

.ito-rerun-btn {
  width: 100%;
  margin-top: 14px;
  border: 0;
  border-radius: 14px;
  padding: 12px 14px;
  background: #111;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition:
    transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.5s cubic-bezier(0.22, 1, 0.36, 1),
    background-color 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.ito-rerun-btn:hover {
  opacity: 0.96;
  transform: translateY(-1px);
}

.ito-rerun-btn:active {
  transform: translateY(0);
}

@keyframes itoFadeUp {
  0% {
    opacity: 0;
    transform: translateY(10px) scale(0.985);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes itoSpinSmooth {
  to {
    transform: rotate(360deg);
  }
}

@keyframes ito-shimmer {
  0% {
    background-position: 200% 0;
  }
  100% {
    background-position: -200% 0;
  }
}

@media (max-width: 991px) {
  .ito-hero-shell {
    padding: 16px;
  }

  .ito-hero-grid {
    grid-template-columns: 1fr;
    min-height: 0;
  }

  .ito-col-left,
  .ito-col-center {
    border-right: 0;
    border-bottom: 1px solid #efefef;
  }

  .ito-col {
    padding: 16px;
  }

  .ito-timeline {
    max-height: 420px;
  }
}

@media (max-width: 767px) {
  .ito-hero-shell {
    padding: 12px;
  }

  .ito-hero-topbar,
  .ito-hero-bottombar {
    padding: 12px 14px;
    flex-wrap: wrap;
  }

  .ito-step {
    grid-template-columns: 18px minmax(0, 1fr);
    gap: 10px;
  }

  .ito-head-progress,
  .ito-bottom-right {
    display: none;
  }

  .ito-step-status {
    display: none;
  }

  .ito-shot {
    width: 38px;
    height: 28px;
  }

  .ito-timeline {
    max-height: 360px;
  }
}

@media (max-width: 479px) {
  .ito-hero-shell {
    padding: 8px;
  }

  .ito-col {
    padding: 14px;
  }

  .ito-step-card,
  .ito-report-summary,
  .ito-statusbar,
  .ito-pr-card,
  .ito-pr-skeleton,
  .ito-metrics,
  .ito-rerun-btn {
    border-radius: 14px;
  }

  .ito-timeline {
    max-height: 320px;
  }
}

      @media (max-width: 767px) {
        .ito-hero-shell {
          padding: 12px;
        }

        .ito-hero-topbar,
        .ito-hero-bottombar {
          padding: 12px 14px;
          flex-wrap: wrap;
        }

        .ito-step {
          grid-template-columns: 18px minmax(0, 1fr);
          gap: 10px;
        }

        .ito-step-status,
        .ito-head-progress,
        .ito-bottom-right {
          display: none;
        }

        .ito-shot {
          width: 38px;
          height: 28px;
        }
      }

  <body>
    <div id="root"></div>

<script>
(function () {
  document.documentElement.classList.remove("dark");

  const STYLE_ID = "ito-hero-styles";
  const BASE_WIDTH = 1280;
  const BASE_HEIGHT = 760;
  const OUTER_PADDING_DESKTOP = 24;
  const OUTER_PADDING_TABLET = 16;
  const OUTER_PADDING_MOBILE = 12;
  const STEP_INTERVAL = 2800;

  const STEPS = [
    {
      id: "s1",
      label: "Authentication flow",
      status: "pass",
      duration: "1.2s",
      actionType: "type",
      actionDetail: 'agent.fill("#email", "user@test.com") → submit',
      codeSnippet: `await page.fill('[data-id="email"]', 'user@test.com');
await page.click('button[type="submit"]');`,
      shots: ["blue", "blue", "blue"],
    },
    {
      id: "s2",
      label: "Cart state management",
      status: "pass",
      duration: "0.8s",
      actionType: "assert",
      actionDetail: "expect(cart.items).toHaveLength(3)",
      codeSnippet: `const items = await page.$$eval('.cart-item', els => els.length);
expect(items).toBe(3);`,
      shots: ["green", "green"],
    },
    {
      id: "s3",
      label: "Checkout - payment step",
      status: "fail",
      duration: "3.4s",
      actionType: "error",
      actionDetail: 'TimeoutError: element "#card-frame" not found after 3000ms',
      codeSnippet: `// Error: Stripe iframe did not mount
await page.waitForSelector('#card-frame', { timeout: 3000 });
// → TimeoutError thrown`,
      shots: ["red", "red", "error"],
    },
    {
      id: "s4",
      label: "Confirmation email",
      status: "pass",
      duration: "1.1s",
      actionType: "snapshot",
      actionDetail: 'snapshot("confirmation") → diff 0px',
      codeSnippet: `await expect(page).toHaveScreenshot(
  'confirmation.png',
  { maxDiffPixels: 0 }
);`,
      shots: ["purple", "purple"],
    },
  ];

  const PULL_REQUESTS = [
    {
      id: "pr-247",
      branch: "feat/analytics-v2",
      title: "Add analytics dashboard",
      sha: "a3f8c1d",
      filesChanged: 12,
    },
    {
      id: "pr-251",
      branch: "fix/checkout-safari",
      title: "Fix checkout regression",
      sha: "b9e2d4a",
      filesChanged: 3,
    },
  ];

  function injectStyles() {
    if (document.getElementById(STYLE_ID)) return;

    const style = document.createElement("style");
    style.id = STYLE_ID;
    style.textContent = `
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background: #f8f8f8;
        font-family: Inter, Arial, Helvetica, sans-serif;
      }

      body {
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      #root {
        width: 100%;
      }

      .ito-stage-shell {
        width: 100%;
        overflow: hidden;
        background: #f8f8f8;

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function getStepIcon(type, state) {
    if (state === "running") {
      return `<span class="ito-step-icon ito-step-icon-running"></span>`;
    }

    if (state === "done" && type === "error") {
      return `<span class="ito-step-icon is-fail">⚠</span>`;
    }

    if (state === "done") {
      return `<span class="ito-step-icon is-pass">✓</span>`;
    }

    switch (type) {
      case "type":
        return `<span class="ito-step-icon">⌨</span>`;
      case "assert":
        return `<span class="ito-step-icon">✓</span>`;
      case "error":
        return `<span class="ito-step-icon">⚠</span>`;
      case "snapshot":
        return `<span class="ito-step-icon">▣</span>`;
      default:
        return `<span class="ito-step-icon">•</span>`;
    }
  }

  function getStepRail(state, status, isLast) {
    let dot = `<div class="ito-step-dot"></div>`;

    if (state === "running") {
      dot = `
        <div class="ito-step-dot is-active">
          <span class="ito-spinner-ring"></span>
        </div>
      `;
    } else if (state === "done" && status === "pass") {
      dot = `<div class="ito-step-dot is-pass">✓</div>`;
    } else if (state === "done" && status === "fail") {
      dot = `<div class="ito-step-dot is-fail">✕</div>`;
    }

    return `
      <div class="ito-step-rail">
        ${dot}
        ${isLast ? "" : `<div class="ito-step-line ${state === "done" ? "is-done" : ""}"></div>`}
      </div>
    `;
  }

  function getShotsHtml(shots, isDone, isFail) {
    return `
      <div class="ito-shot-row">
        ${shots.map(function (shot) {
          const errorLabel =
            shot === "error" && isFail
              ? `<span class="ito-shot-error-label">ERR</span>`
              : "";
          return `<span class="ito-shot ${shot} ${isDone ? "is-done" : ""}">${errorLabel}</span>`;
        }).join("")}
      </div>
    `;
  }

  function renderPullRequests() {
    return PULL_REQUESTS.map(function (pr) {
      return `
        <article class="ito-pr-card">
          <div class="ito-pr-icon">⎇</div>
          <div class="ito-pr-body">
            <div class="ito-pr-title">${escapeHtml(pr.title)}</div>
            <div class="ito-pr-branch">${escapeHtml(pr.branch)}</div>
            <div class="ito-pr-meta">
              <span>#${escapeHtml(pr.id.replace("pr-", ""))}</span>
              <span>${pr.filesChanged} files</span>
            </div>
            <div class="ito-progress"><span></span></div>
            <div class="ito-pr-footer">
              <span>${escapeHtml(pr.sha)}</span>
              <span>checking…</span>
            </div>
          </div>
        </article>
      `;
    }).join("");
  }

  function renderTimeline(activeIndex) {
    return STEPS.map(function (step, index) {
      const isLast = index === STEPS.length - 1;
      const isDone = activeIndex > index;
      const isRunning = activeIndex === index;
      const isFuture = activeIndex < index;

      const cardClass = [
        "ito-step-card",
        isRunning ? "is-active" : "",
        isFuture ? "is-dim" : "",
        isDone && step.status === "fail" ? "is-fail" : "",
      ].filter(Boolean).join(" ");

      const wrapperClass = [
        "ito-step",
        isDone ? "is-complete" : "",
        isRunning ? "is-active" : "",
        isFuture ? "is-future" : "",
      ].filter(Boolean).join(" ");

      const showExpanded = isDone || isRunning;
      const showStatus = isDone;

      const rightStatus = isRunning
        ? `<span>running…</span>`
        : showStatus
          ? `
            <span>${escapeHtml(step.duration)}</span>
            <span class="${step.status === "pass" ? "is-pass" : "is-fail"}">${escapeHtml(step.status)}</span>
          `
          : "";

      return `
        <article class="${wrapperClass}" data-step-index="${index}">
          ${getStepRail(isRunning ? "running" : isDone ? "done" : "idle", step.status, isLast)}
          <div class="${cardClass}">
            <div class="ito-step-top">
              <div class="ito-step-title-wrap">
                ${getStepIcon(step.actionType, isRunning ? "running" : isDone ? "done" : "idle")}
                <span class="ito-step-title">${escapeHtml(step.label)}</span>
              </div>
              <div class="ito-step-status">
                ${rightStatus}
              </div>
            </div>
            <div class="ito-step-sub ${step.status === "fail" ? "is-error" : ""}">
              ${escapeHtml(step.actionDetail)}
            </div>
            ${
              showExpanded
                ? `
                  <div class="ito-step-expand">
                    ${getShotsHtml(step.shots, isDone, step.status === "fail")}
                    <pre class="ito-code"><code>${escapeHtml(step.codeSnippet)}</code></pre>
                  </div>
                `
                : ""
            }
          </div>
        </article>
      `;
    }).join("");
  }

  function renderReport(activeIndex) {
    return STEPS.map(function (step, index) {
      const isDone = activeIndex > index;
      const isRunning = activeIndex === index;
      const isFuture = activeIndex < index;

      const rowClass = [
        "ito-report-row",
        isRunning ? "is-current" : "",
        isFuture ? "is-muted" : "",
      ].filter(Boolean).join(" ");

      const leftIcon = isRunning
        ? `<span class="ito-mini active"></span>`
        : isDone && step.status === "pass"
          ? `<span class="ito-mini pass">✓</span>`
          : isDone && step.status === "fail"
            ? `<span class="ito-mini fail">✕</span>`
            : `<span class="ito-mini"></span>`;

      const right = isDone
        ? `
          <div class="ito-report-right">
            <span>${escapeHtml(step.duration)}</span>
            <span class="${step.status === "pass" ? "is-pass" : "is-fail"}">${escapeHtml(step.status)}</span>
          </div>
        `
        : "";

      return `
        <div class="${rowClass}">
          <div class="ito-report-left">
            ${leftIcon}
            <span>${escapeHtml(step.label)}</span>
          </div>
          ${right}
        </div>
      `;
    }).join("");
  }

  function renderHero(stepIndex) {
    const safeIndex = Math.max(0, Math.min(stepIndex, STEPS.length));
    const progress = Math.max(0, Math.min(Math.round((safeIndex / STEPS.length) * 100), 100));

    const runningLabel =
      safeIndex === 0
        ? "Initialising…"
        : safeIndex <= STEPS.length
          ? "Executing: " + STEPS[Math.min(safeIndex - 1, STEPS.length - 1)].label
          : "Run complete";

    return `
      <section class="ito-stage-shell">
        <div class="ito-scale-wrap" data-ito-scale-wrap>
          <div class="ito-scale-stage" data-ito-scale-stage>
            <div class="ito-hero-frame">
              <div class="ito-hero-topbar">
                <span class="ito-kicker">Automated QA</span>
                <div class="ito-live">
                  <span class="ito-live-dot"></span>
                  <span>Live</span>
                </div>
              </div>

              <div class="ito-hero-grid">
                <aside class="ito-col ito-col-left">
                  <div class="ito-col-head">Pull Requests</div>

                  <div class="ito-pr-list">
                    ${renderPullRequests()}
                    <article class="ito-pr-skeleton">
                      <div class="ito-pr-skeleton-dot"></div>
                      <div class="ito-pr-skeleton-lines">
                        <span></span>
                        <span></span>
                      </div>
                    </article>
                  </div>

                  <div class="ito-run-meta">
                    <span class="ito-run-spinner"></span>
                    <span>ito-agent · run #88241</span>
                  </div>
                </aside>

                <main class="ito-col ito-col-center">
                  <div class="ito-col-head ito-col-head-split">
                    <span>Agent Timeline</span>
                    <div class="ito-head-progress">
                      <span>step ${Math.min(Math.max(safeIndex, 1), STEPS.length)}/${STEPS.length}</span>
                      <div class="ito-progress ito-progress-short">
                        <span style="width:${progress}%"></span>
                      </div>
                    </div>
                  </div>

                  <div class="ito-timeline-viewport" data-timeline-viewport>
                    <div class="ito-timeline-track" data-timeline-track>
                      ${renderTimeline(safeIndex)}
                    </div>
                  </div>

                  <div class="ito-statusbar">
                    <div class="ito-status-left">
                      <span class="ito-run-spinner"></span>
                      <span>${escapeHtml(runningLabel)}</span>
                    </div>
                    <span>ito-agent</span>
                  </div>
                </main>

                <aside class="ito-col ito-col-right">
                  <div class="ito-col-head">QA Report</div>

                  <div class="ito-report-summary">
                    <div class="ito-report-summary-top">
                      <span>Coverage</span>
                      <strong>${progress}%</strong>
                    </div>
                    <div class="ito-progress">
                      <span style="width:${progress}%"></span>
                    </div>
                    <div class="ito-report-summary-bottom">
                      <span>#run-88241</span>
                      <span>${safeIndex > 0 ? (safeIndex * 2) + "s" : "—"}</span>
                    </div>
                  </div>

                  <div class="ito-report-list">
                    ${renderReport(safeIndex)}
                  </div>

                  <div class="ito-report-footer">
                    <div class="ito-metrics">
                      <div>
                        <p>Total</p>
                        <strong>${STEPS.length}</strong>
                      </div>
                      <div class="is-bordered">
                        <p>Passed</p>
                        <strong class="is-pass">${STEPS.filter(function (s) { return s.status === "pass"; }).length}</strong>
                      </div>
                      <div>
                        <p>Failed</p>
                        <strong class="is-fail">${STEPS.filter(function (s) { return s.status === "fail"; }).length}</strong>
                      </div>
                    </div>

                    <button class="ito-rerun-btn" type="button">Re-run suite</button>
                  </div>
                </aside>
              </div>

              <div class="ito-hero-bottombar">
                <span>ito · qa engine</span>
                <div class="ito-bottom-right">
                  <span>2 PRs · 4 tests · 1 failure</span>
                  <span class="ito-connected"><i></i>Connected</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    `;
  }

  function getOuterPadding() {
    const w = window.innerWidth || document.documentElement.clientWidth || 0;
    if (w <= 767) return OUTER_PADDING_MOBILE;
    if (w <= 991) return OUTER_PADDING_TABLET;
    return OUTER_PADDING_DESKTOP;
  }

  function updateScale(root) {
    const wrap = root.querySelector("[data-ito-scale-wrap]");
    const stage = root.querySelector("[data-ito-scale-stage]");
    const shell = root.querySelector(".ito-stage-shell");

    if (!wrap || !stage || !shell) return;

    const outerPadding = getOuterPadding();
    shell.style.padding = outerPadding + "px";

    const availableWidth = Math.max(320, wrap.clientWidth);
    const scale = Math.min(1, availableWidth / BASE_WIDTH);
    const scaledHeight = Math.round(BASE_HEIGHT * scale);

    stage.style.transform = "scale(" + scale + ")";
    wrap.style.height = scaledHeight + "px";
  }

  function updateTimelineTransform(root, activeIndex) {
    const viewport = root.querySelector("[data-timeline-viewport]");
    const track = root.querySelector("[data-timeline-track]");
    const active = root.querySelector('.ito-step.is-active');

    if (!viewport || !track || !active) {
      if (track) track.style.transform = "translateY(0px)";
      return;
    }

    const viewportHeight = viewport.clientHeight;
    const activeTop = active.offsetTop;
    const activeHeight = active.offsetHeight;
    const activeCenter = activeTop + activeHeight / 2;
    const targetY = Math.max(0, activeCenter - viewportHeight / 2);
    const maxY = Math.max(0, track.scrollHeight - viewportHeight);
    const clampedY = Math.min(targetY, maxY);

    track.style.transform = "translateY(-" + clampedY + "px)";
  }

  function lockWheelAndTouch(root) {
    const stop = function (e) {
      const inside = e.target && root.contains(e.target);
      if (!inside) return;

      if (e.type === "wheel") {
        e.preventDefault();
      }

      if (e.type === "touchmove") {
        e.preventDefault();
      }
    };

    root.__itoInputLockHandler = stop;
    root.addEventListener("wheel", stop, { passive: false });
    root.addEventListener("touchmove", stop, { passive: false });
  }

  function unlockWheelAndTouch(root) {
    if (!root.__itoInputLockHandler) return;
    root.removeEventListener("wheel", root.__itoInputLockHandler);
    root.removeEventListener("touchmove", root.__itoInputLockHandler);
    root.__itoInputLockHandler = null;
  }

  function startHeroAnimation(root) {
    let stepIndex = 0;
    let intervalId = null;

    function render() {
      root.innerHTML = renderHero(stepIndex);
      updateScale(root);
      updateTimelineTransform(root, stepIndex);

      const button = root.querySelector(".ito-rerun-btn");
      if (button) {
        button.addEventListener("click", function () {
          stepIndex = 0;
          render();

          if (intervalId) {
            clearInterval(intervalId);
          }

          intervalId = setInterval(function () {
            stepIndex = (stepIndex + 1) % (STEPS.length + 2);
            render();
          }, STEP_INTERVAL);
        });
      }
    }

    render();

    intervalId = setInterval(function () {
      stepIndex = (stepIndex + 1) % (STEPS.length + 2);
      render();
    }, STEP_INTERVAL);

    root.__itoCleanup = function () {
      if (intervalId) clearInterval(intervalId);
    };
  }

  function mountHero() {
    injectStyles();

    const root = document.getElementById("root");
    if (!root) return;

    if (typeof root.__itoCleanup === "function") {
      root.__itoCleanup();
    }

    unlockWheelAndTouch(root);
    lockWheelAndTouch(root);

    startHeroAnimation(root);

    if (root.__itoResizeHandler) {
      window.removeEventListener("resize", root.__itoResizeHandler);
    }

    root.__itoResizeHandler = function () {
      updateScale(root);
      updateTimelineTransform(root);
    };

    window.addEventListener("resize", root.__itoResizeHandler, { passive: true });

    if ("ResizeObserver" in window) {
      if (root.__itoResizeObserver) {
        root.__itoResizeObserver.disconnect();
      }

      root.__itoResizeObserver = new ResizeObserver(function () {
        updateScale(root);
        updateTimelineTransform(root);
      });

      root.__itoResizeObserver.observe(root);
    }

    updateScale(root);
    updateTimelineTransform(root);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", mountHero);
  } else {
    mountHero();
  }
})();
</script>
  </body>
</html>
