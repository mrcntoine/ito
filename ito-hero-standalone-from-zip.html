<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Ito QA Hero Animation</title>

    <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

:root {
  --background: #f8f8f8;
  --foreground: #141414;

  --surface: #ffffff;
  --surface-alt: #fcfcfc;
  --surface-soft: #fafafa;

  --border: #e7e7e7;
  --border-soft: #efefef;
  --border-strong: #d9d9d9;
  --border-active: #3a3a3a;

  --text-primary: #111111;
  --text-secondary: #666666;
  --text-muted: #888888;

  --success: #16a34a;
  --success-soft: #f0fdf4;

  --danger: #dc2626;
  --danger-soft: #fffafa;
  --danger-border: #f1caca;

  --radius-frame: 20px;
  --radius-lg: 16px;
  --radius-md: 14px;
  --radius-sm: 12px;
  --radius-xs: 10px;

  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-morph: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-settle: cubic-bezier(0.33, 1, 0.68, 1);

  --duration-fast: 180ms;
  --duration-base: 320ms;
  --duration-slow: 500ms;
  --duration-scroll: 600ms;

  --font-body: "Inter", Arial, Helvetica, sans-serif;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body,
#root {
  width: 100%;
  min-height: 100%;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  background-color: var(--background);
  color: var(--foreground);
  font-family: var(--font-body);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button,
input,
select,
textarea {
  font: inherit;
  color: inherit;
}

/* ━━━━━ LAYOUT SHELL ━━━━━ */

.ito-stage-shell {
  width: 100%;
  overflow: hidden;
  background: var(--background);
  padding: 24px;
}

.ito-scale-wrap {
  width: 100%;
  max-width: 1280px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

.ito-scale-stage {
  width: 1280px;
  height: 760px;
  transform-origin: top left;
  will-change: transform;
}

.ito-hero-frame {
  width: 1280px;
  height: 760px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-frame);
  overflow: hidden;
}

/* ━━━━━ TOP / BOTTOM BARS ━━━━━ */

.ito-hero-topbar,
.ito-hero-bottombar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  height: 52px;
  padding: 0 18px;
  background: var(--surface-alt);
  font-size: 11px;
  line-height: 1;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.ito-hero-topbar { border-bottom: 1px solid var(--border-soft); }
.ito-hero-bottombar { border-top: 1px solid var(--border-soft); }

.ito-kicker {
  font-weight: 600;
  color: var(--text-primary);
}

.ito-live,
.ito-connected,
.ito-status-left,
.ito-run-meta,
.ito-bottom-right {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.ito-live-dot,
.ito-connected i,
.ito-run-spinner,
.ito-mini.active {
  display: inline-block;
  border-radius: 999px;
}

.ito-live-dot,
.ito-connected i {
  width: 8px;
  height: 8px;
  background: var(--success);
  box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
}

/* ━━━━━ GRID ━━━━━ */

.ito-hero-grid {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr) 280px;
  height: calc(760px - 104px);
  min-height: 0;
}

.ito-col {
  min-width: 0;
  min-height: 0;
  padding: 18px;
  overflow: hidden;
}

.ito-col-center {
  display: flex;
  flex-direction: column;
}

.ito-center-main {
  flex: 1 1 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.ito-col-left,
.ito-col-center {
  border-right: 1px solid var(--border-soft);
}

.ito-col-head,
.ito-col-head-split {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  font-weight: 600;
  flex-shrink: 0;
}

.ito-head-progress {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 10px;
  color: var(--text-muted);
}

/* ━━━━━ PR CARDS ━━━━━ */

.ito-pr-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.ito-pr-card,
.ito-pr-skeleton,
.ito-step-card,
.ito-statusbar,
.ito-report-summary,
.ito-report-list,
.ito-metrics,
.ito-rerun-btn {
  border-width: 1px;
  border-style: solid;
  border-color: var(--border);
}

.ito-pr-card,
.ito-pr-skeleton {
  display: flex;
  gap: 12px;
  padding: 12px;
  border-radius: var(--radius-md);
  background: var(--surface);
}

.ito-pr-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-xs);
  display: grid;
  place-items: center;
  background: #f3f3f3;
  border: 1px solid var(--border-soft);
  color: var(--text-primary);
  font-size: 15px;
  flex: 0 0 auto;
}

.ito-pr-body { min-width: 0; flex: 1; }

.ito-pr-title {
  font-size: 13px;
  line-height: 1.35;
  font-weight: 600;
  color: var(--text-primary);
}

.ito-pr-branch, .ito-pr-meta, .ito-pr-footer {
  font-size: 11px;
  color: #777777;
}

.ito-pr-branch { margin-top: 2px; }

.ito-pr-meta, .ito-pr-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 8px;
}

.ito-progress {
  position: relative;
  width: 100%;
  height: 6px;
  background: #f1f1f1;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
}

.ito-progress > span {
  position: absolute;
  inset: 0 auto 0 0;
  width: 58%;
  border-radius: inherit;
  background: linear-gradient(90deg, #111111 0%, #666666 100%);
  transition: width 0.7s var(--ease-settle);
}

.ito-progress-short { width: 84px; margin-top: 0; }

.ito-pr-skeleton-dot {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-xs);
  background: linear-gradient(90deg, #f1f1f1 25%, #fafafa 50%, #f1f1f1 75%);
  background-size: 200% 100%;
  animation: ito-shimmer 1.5s linear infinite;
  flex: 0 0 auto;
}

.ito-pr-skeleton-lines {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: center;
}

.ito-pr-skeleton-lines span {
  display: block;
  height: 10px;
  border-radius: 999px;
  background: linear-gradient(90deg, #f1f1f1 25%, #fafafa 50%, #f1f1f1 75%);
  background-size: 200% 100%;
  animation: ito-shimmer 1.5s linear infinite;
}

.ito-pr-skeleton-lines span:first-child { width: 65%; }
.ito-pr-skeleton-lines span:last-child { width: 40%; }

.ito-run-meta {
  margin-top: 14px;
  font-size: 11px;
  color: #777777;
}

.ito-run-spinner {
  width: 10px;
  height: 10px;
  border: 1.5px solid #d8d8d8;
  border-top-color: #111111;
  animation: ito-spin 0.9s linear infinite;
}

/* ━━━━━ TIMELINE ━━━━━ */

.ito-timeline-viewport {
  position: relative;
  flex: 1 1 0;
  min-height: 0;
  overflow: hidden;
}

.ito-timeline-track {
  display: flex;
  flex-direction: column;
  gap: 14px;
  /* pad top so first card border isn't clipped by overflow:hidden when translateY(-1px) */
  padding-top: 2px;
  transform: translateY(0);
  transition: transform var(--duration-scroll) var(--ease-settle);
  will-change: transform;
}

.ito-step {
  display: block;
}

/* ━━━━━ STEP CARD ━━━━━ */

.ito-step-card {
  border-radius: var(--radius-lg);
  padding: 14px;
  background: var(--surface);
  transition:
    opacity var(--duration-base) var(--ease-morph),
    transform var(--duration-base) var(--ease-morph),
    border-color var(--duration-base) var(--ease-morph),
    background-color var(--duration-base) var(--ease-morph);
  will-change: transform, opacity;
  transform: translateY(0);
}

.ito-step-card.is-active {
  border-color: var(--border-active);
  transform: translateY(-1px);
}

.ito-step-card.is-dim {
  opacity: 0.42;
  border-color: var(--border-soft);
  transform: translateY(3px);
}

.ito-step-card.is-fail {
  border-color: var(--danger-border);
  background: var(--danger-soft);
}

/* ── Step internals ── */

.ito-step-top,
.ito-step-title-wrap,
.ito-step-status,
.ito-report-row,
.ito-report-left,
.ito-report-right,
.ito-report-summary-top,
.ito-report-summary-bottom,
.ito-metrics {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.ito-step-title-wrap,
.ito-report-left {
  justify-content: flex-start;
  min-width: 0;
}

.ito-step-icon,
.ito-mini {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: #f1f1f1;
  color: #666666;
  font-size: 11px;
  flex: 0 0 auto;
  transition:
    background-color var(--duration-fast) var(--ease-morph),
    color var(--duration-fast) var(--ease-morph);
}

.ito-step-icon.is-pass, .ito-mini.pass {
  background: var(--success-soft);
  color: var(--success);
}

.ito-step-icon.is-fail, .ito-mini.fail {
  background: #fef2f2;
  color: var(--danger);
}

.ito-step-icon-running {
  background: #111111;
  position: relative;
}

.ito-step-icon-running::after {
  content: "";
  width: 10px;
  height: 10px;
  border-radius: 999px;
  border: 1.5px solid rgba(255, 255, 255, 0.2);
  border-top-color: #ffffff;
  animation: ito-spin 0.85s linear infinite;
}

.ito-step-title {
  min-width: 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.35;
}

.ito-step-status {
  font-size: 11px;
  color: #777777;
  flex: 0 0 auto;
}

.ito-step-status .is-pass, .ito-report-right .is-pass, .ito-metrics .is-pass { color: var(--success); }
.ito-step-status .is-fail, .ito-report-right .is-fail, .ito-metrics .is-fail { color: var(--danger); }

.ito-step-sub {
  margin-top: 7px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-secondary);
}

.ito-step-sub.is-error { color: #b91c1c; }

/* ── Expand panel ── */

.ito-step-expand {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-soft);
}

.ito-step-expand .ito-shot-row {
  animation: ito-fade-up 350ms var(--ease-out) both;
}

.ito-step-expand .ito-code {
  animation: ito-fade-up 350ms var(--ease-out) 80ms both;
}

/* ━━━━━ MINI SCREENSHOTS ━━━━━ */

.ito-shot-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.ito-shot {
  width: 64px;
  height: 44px;
  border-radius: 7px;
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
  background: #ffffff;
  flex: 0 0 auto;
  transition:
    transform var(--duration-base) var(--ease-morph),
    opacity var(--duration-base) var(--ease-morph);
}

.ito-step.is-active .ito-shot {
  transform: translateY(-1px);
}

.ito-shot svg {
  display: block;
  width: 100%;
  height: 100%;
}

.ito-shot.error {
  background: #1a1a1a;
  border-color: rgba(255, 255, 255, 0.08);
}

.ito-shot-error-label {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 8px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #ef4444;
}

.ito-code {
  margin: 0;
  padding: 12px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  background: var(--surface-soft);
  overflow: hidden;
  font-size: 11px;
  line-height: 1.5;
  color: #333333;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

/* ━━━━━ STATUS BAR ━━━━━ */

.ito-statusbar {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: var(--radius-md);
  background: var(--surface-alt);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 11px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

/* ━━━━━ QA REPORT ━━━━━ */

.ito-report-summary {
  padding: 14px;
  border-radius: var(--radius-lg);
  background: var(--surface-alt);
}

.ito-report-summary-top strong {
  font-size: 22px;
  line-height: 1;
  color: var(--text-primary);
}

.ito-report-summary-top,
.ito-report-summary-bottom {
  font-size: 11px;
  color: #777777;
}

.ito-report-summary-bottom { margin-top: 10px; }

.ito-report-list {
  margin-top: 14px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
}

.ito-report-row {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-soft);
  transition:
    opacity var(--duration-base) var(--ease-morph),
    background-color var(--duration-base) var(--ease-morph),
    transform var(--duration-base) var(--ease-morph);
}

.ito-report-row:last-child { border-bottom: 0; }

.ito-report-row.is-muted {
  opacity: 0.45;
  transform: translateY(2px);
}

.ito-report-row.is-current {
  background: var(--surface-alt);
  transform: translateY(-1px);
}

.ito-report-left, .ito-report-right {
  font-size: 12px;
  color: #555555;
}

.ito-report-footer { margin-top: 14px; }

.ito-metrics {
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
}

.ito-metrics > div {
  flex: 1 1 0;
  padding: 14px 12px;
  text-align: center;
}

.ito-metrics > div.is-bordered {
  border-left: 1px solid var(--border-soft);
  border-right: 1px solid var(--border-soft);
}

.ito-metrics p {
  margin: 0 0 4px;
  font-size: 11px;
  color: #777777;
}

.ito-metrics strong {
  font-size: 18px;
  line-height: 1;
  color: var(--text-primary);
}

/* ━━━━━ RERUN BUTTON ━━━━━ */

.ito-rerun-btn {
  width: 100%;
  margin-top: 14px;
  border-radius: var(--radius-md);
  padding: 12px 14px;
  background: #111111;
  color: #ffffff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition:
    transform 150ms ease,
    opacity 150ms ease,
    background-color 150ms ease;
}

.ito-rerun-btn:hover {
  background: #222222;
  transform: translateY(-1px);
}

.ito-rerun-btn:active {
  transform: scale(0.97) translateY(0);
  opacity: 0.92;
}

/* ━━━━━ KEYFRAMES ━━━━━ */

@keyframes ito-fade-up {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes ito-spin {
  to { transform: rotate(360deg); }
}

@keyframes ito-shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ━━━━━ REDUCED MOTION ━━━━━ */

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .ito-timeline-track { transition: none !important; }
  .ito-step-card, .ito-step-card.is-active, .ito-step-card.is-dim { transform: none !important; }
  .ito-progress > span { transition: none !important; }
}

@media (max-width: 991px) { .ito-stage-shell { padding: 16px; } }
@media (max-width: 767px) { .ito-stage-shell { padding: 12px; } }

          "cart-1": '<svg viewBox="0 0 64 44" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="44" fill="#f8fdf8"/><rect x="4" y="3" width="56" height="3" rx="1.5" fill="#e2e8f0"/><rect x="4" y="10" width="12" height="10" rx="2" fill="#dcfce7"/><rect x="19" y="11" width="22" height="2.5" rx="1" fill="#333"/><rect x="19" y="15.5" width="14" height="2" rx="1" fill="#aaa"/><rect x="4" y="23" width="12" height="10" rx="2" fill="#dcfce7"/><rect x="19" y="24" width="18" height="2.5" rx="1" fill="#333"/><rect x="19" y="28.5" width="10" height="2" rx="1" fill="#aaa"/><rect x="4" y="36" width="12" height="5" rx="2" fill="#dcfce7"/><rect x="19" y="37" width="20" height="2.5" rx="1" fill="#333"/></svg>',
          "cart-2": '<svg viewBox="0 0 64 44" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="44" fill="#f8fdf8"/><rect x="4" y="3" width="56" height="3" rx="1.5" fill="#e2e8f0"/><rect x="4" y="10" width="56" height="1" fill="#e5e7eb"/><rect x="4" y="14" width="20" height="2" rx="1" fill="#888"/><rect x="44" y="14" width="16" height="2" rx="1" fill="#888"/><rect x="4" y="20" width="56" height="1" fill="#f0f0f0"/><rect x="4" y="24" width="20" height="2" rx="1" fill="#888"/><rect x="44" y="24" width="16" height="2" rx="1" fill="#888"/><rect x="4" y="30" width="56" height="1" fill="#f0f0f0"/><rect x="4" y="34" width="20" height="2" rx="1" fill="#888"/><rect x="44" y="34" width="16" height="2" rx="1" fill="#16a34a"/></svg>',
          /* Payment — checkout form screens */
          "pay-1": '<svg viewBox="0 0 64 44" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="44" fill="#fffafa"/><rect x="4" y="3" width="56" height="3" rx="1.5" fill="#e2e8f0"/><rect x="8" y="11" width="48" height="8" rx="3" fill="#fff" stroke="#e5e7eb" stroke-width="0.8"/><rect x="11" y="13.5" width="30" height="2.5" rx="1" fill="#fca5a5"/><rect x="8" y="23" width="23" height="8" rx="3" fill="#fff" stroke="#e5e7eb" stroke-width="0.8"/><rect x="33" y="23" width="23" height="8" rx="3" fill="#fff" stroke="#e5e7eb" stroke-width="0.8"/><rect x="16" y="35" width="32" height="5" rx="2.5" fill="#111"/></svg>',
          "pay-2": '<svg viewBox="0 0 64 44" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="44" fill="#fffafa"/><rect x="4" y="3" width="56" height="3" rx="1.5" fill="#e2e8f0"/><rect x="8" y="11" width="48" height="8" rx="3" fill="#fff" stroke="#fca5a5" stroke-width="1"/><rect x="8" y="23" width="23" height="8" rx="3" fill="#fff" stroke="#e5e7eb" stroke-width="0.8"/><rect x="33" y="23" width="23" height="8" rx="3" fill="#fff" stroke="#e5e7eb" stroke-width="0.8"/><rect x="8" y="33" width="48" height="2" rx="1" fill="#fecaca"/></svg>',
          /* Confirmation — email screens */
          "confirm-1": '<svg viewBox="0 0 64 44" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="44" fill="#faf8ff"/><rect x="4" y="3" width="56" height="3" rx="1.5" fill="#e2e8f0"/><circle cx="32" cy="16" r="5" fill="#f3e8ff" stroke="#a855f7" stroke-width="0.8"/><rect x="30" y="14.5" width="4" height="3" rx="0" fill="none" stroke="#a855f7" stroke-width="0.8"/><rect x="14" y="25" width="36" height="2.5" rx="1" fill="#333"/><rect x="18" y="30" width="28" height="2" rx="1" fill="#aaa"/><rect x="20" y="35" width="24" height="2" rx="1" fill="#aaa"/></svg>',
          "confirm-2": '<svg viewBox="0 0 64 44" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="44" fill="#f0fdf4"/><rect x="4" y="3" width="56" height="3" rx="1.5" fill="#e2e8f0"/><circle cx="32" cy="18" r="7" fill="#dcfce7" stroke="#16a34a" stroke-width="0.8"/><line x1="29" y1="18" x2="31" y2="20.5" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/><line x1="31" y1="20.5" x2="35.5" y2="15" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/><rect x="16" y="29" width="32" height="2.5" rx="1" fill="#333"/><rect x="20" y="34" width="24" height="2" rx="1" fill="#aaa"/></svg>',
        };

        /* ── UTILITIES ── */

        function esc(v) {
          return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
        }

        function getShellPadding() {
          var w = window.innerWidth || document.documentElement.clientWidth || 0;
          if (w <= 767) return SHELL_PADDING_MOBILE;
          if (w <= 991) return SHELL_PADDING_TABLET;
          return SHELL_PADDING_DESKTOP;
        }

        function clamp(v, lo, hi) { return Math.max(lo, Math.min(v, hi)); }

        /* ── ICON / RAIL ── */

        function stepIconHtml(type, state) {
          if (state === "running") return '<span class="ito-step-icon ito-step-icon-running"></span>';
          if (state === "done" && type === "error") return '<span class="ito-step-icon is-fail">\u26A0</span>';
          if (state === "done") return '<span class="ito-step-icon is-pass">\u2713</span>';
          var m = { type: "\u2328", assert: "\u2713", error: "\u26A0", snapshot: "\u25A3" };
          return '<span class="ito-step-icon">' + (m[type] || "\u2022") + "</span>";
        }

        function shotsHtml(shots, isDone, isFail) {
          var h = '<div class="ito-shot-row">';
          for (var i = 0; i < shots.length; i++) {
            var id = shots[i];
            if (id === "error") {
              h += '<span class="ito-shot error"><span class="ito-shot-error-label">ERR</span></span>';
            } else {
              h += '<span class="ito-shot">' + (SHOT_SVGS[id] || "") + "</span>";
            }
          }
          return h + "</div>";
        }

        /* ━━━━━ SHELL BUILD ━━━━━ */

        function buildShell() {
          var prCards = PULL_REQUESTS.map(function (pr) {
            return '<article class="ito-pr-card"><div class="ito-pr-icon">\u2387</div><div class="ito-pr-body">' +
              '<div class="ito-pr-title">' + esc(pr.title) + "</div>" +
              '<div class="ito-pr-branch">' + esc(pr.branch) + "</div>" +
              '<div class="ito-pr-meta"><span>#' + esc(pr.id.replace("pr-","")) + "</span><span>" + pr.filesChanged + " files</span></div>" +
              '<div class="ito-progress"><span></span></div>' +
              '<div class="ito-pr-footer"><span>' + esc(pr.sha) + "</span><span>checking\u2026</span></div></div></article>";
          }).join("");

          var timelineSteps = STEPS.map(function (s, i) {
            return '<article class="ito-step is-future" data-step-index="' + i + '">' +
              '<div class="ito-step-card is-dim" data-card="' + i + '">' +
                '<div class="ito-step-top"><div class="ito-step-title-wrap"><span data-icon="' + i + '"></span><span class="ito-step-title">' + esc(s.label) + '</span></div><div class="ito-step-status" data-status="' + i + '"></div></div>' +
                '<div class="ito-step-sub' + (s.status==="fail"?" is-error":"") + '">' + esc(s.actionDetail) + '</div>' +
                '<div data-expand="' + i + '"></div>' +
              "</div></article>";
          }).join("");

          var reportRows = STEPS.map(function (s, i) {
            return '<div class="ito-report-row is-muted" data-report="' + i + '"><div class="ito-report-left"><span class="ito-mini" data-ricon="' + i + '"></span><span>' + esc(s.label) + '</span></div><div class="ito-report-right" data-rright="' + i + '"></div></div>';
          }).join("");

          var pc = STEPS.filter(function(s){return s.status==="pass"}).length;
          var fc = STEPS.filter(function(s){return s.status==="fail"}).length;

          return '<section class="ito-stage-shell"><div class="ito-scale-wrap" data-ito-scale-wrap><div class="ito-scale-stage" data-ito-scale-stage><div class="ito-hero-frame">' +
            '<div class="ito-hero-topbar"><span class="ito-kicker">Automated QA</span><div class="ito-live"><span class="ito-live-dot"></span><span>Live</span></div></div>' +
            '<div class="ito-hero-grid">' +
              '<aside class="ito-col ito-col-left"><div class="ito-col-head">Pull Requests</div><div class="ito-pr-list">' + prCards +
                '<article class="ito-pr-skeleton"><div class="ito-pr-skeleton-dot"></div><div class="ito-pr-skeleton-lines"><span></span><span></span></div></article>' +
              '</div><div class="ito-run-meta"><span class="ito-run-spinner"></span><span>ito-agent \u00b7 run #88241</span></div></aside>' +
              '<main class="ito-col ito-col-center"><div class="ito-center-main">' +
                '<div class="ito-col-head ito-col-head-split"><span>Agent Timeline</span><div class="ito-head-progress"><span data-step-counter>step 1/' + STEPS.length + '</span><div class="ito-progress ito-progress-short"><span data-step-progress style="width:0%"></span></div></div></div>' +
                '<div class="ito-timeline-viewport" data-timeline-viewport><div class="ito-timeline-track" data-timeline-track>' + timelineSteps + '</div></div>' +
                '<div class="ito-statusbar"><div class="ito-status-left"><span class="ito-run-spinner"></span><span data-status-label>Initialising\u2026</span></div><span>ito-agent</span></div>' +
              '</div></main>' +
              '<aside class="ito-col ito-col-right"><div class="ito-col-head">QA Report</div>' +
                '<div class="ito-report-summary"><div class="ito-report-summary-top"><span>Coverage</span><strong data-coverage>0%</strong></div><div class="ito-progress"><span data-coverage-bar style="width:0%"></span></div><div class="ito-report-summary-bottom"><span>#run-88241</span><span data-elapsed>\u2014</span></div></div>' +
                '<div class="ito-report-list">' + reportRows + '</div>' +
                '<div class="ito-report-footer"><div class="ito-metrics"><div><p>Total</p><strong>' + STEPS.length + '</strong></div><div class="is-bordered"><p>Passed</p><strong class="is-pass">' + pc + '</strong></div><div><p>Failed</p><strong class="is-fail">' + fc + '</strong></div></div><button class="ito-rerun-btn" type="button">Re-run suite</button></div>' +
              '</aside>' +
            '</div>' +
            '<div class="ito-hero-bottombar"><span>ito \u00b7 qa engine</span><div class="ito-bottom-right"><span>2 PRs \u00b7 4 tests \u00b7 1 failure</span><span class="ito-connected"><i></i>Connected</span></div></div>' +
          '</div></div></div></section>';
        }

        /* ━━━━━ DIFFERENTIAL UPDATE ━━━━━
           activeIndex: 0..STEPS.length-1 = running that step
                        STEPS.length      = "complete" — all done, all collapsed
        */

        function updateState(root, activeIndex) {
          var isComplete = activeIndex >= STEPS.length;
          var safeIndex = clamp(activeIndex, 0, STEPS.length);
          var progress = clamp(Math.round((safeIndex / STEPS.length) * 100), 0, 100);

          var counter = root.querySelector("[data-step-counter]");
          if (counter) counter.textContent = "step " + (isComplete ? STEPS.length : clamp(safeIndex, 1, STEPS.length)) + "/" + STEPS.length;

          var progBar = root.querySelector("[data-step-progress]");
          if (progBar) progBar.style.width = progress + "%";

          var label = root.querySelector("[data-status-label]");
          if (label) {
            label.textContent = isComplete
              ? "Run complete"
              : safeIndex === 0
                ? "Initialising\u2026"
                : "Executing: " + STEPS[Math.min(safeIndex - 1, STEPS.length - 1)].label;
          }

          var cov = root.querySelector("[data-coverage]");
          if (cov) cov.textContent = progress + "%";
          var covBar = root.querySelector("[data-coverage-bar]");
          if (covBar) covBar.style.width = progress + "%";
          var elapsed = root.querySelector("[data-elapsed]");
          if (elapsed) elapsed.textContent = safeIndex > 0 ? (safeIndex * 2) + "s" : "\u2014";

          for (var i = 0; i < STEPS.length; i++) {
            var step = STEPS[i];
            var isDone = safeIndex > i;
            var isRunning = !isComplete && safeIndex === i;
            var isFuture = safeIndex < i;
            var stateStr = isRunning ? "running" : isDone ? "done" : "idle";
            var isLast = i === STEPS.length - 1;

            /* In "complete" state, all are done, none are running */
            if (isComplete) {
              isDone = true;
              isRunning = false;
              isFuture = false;
              stateStr = "done";
            }

            var wrapper = root.querySelector('[data-step-index="' + i + '"]');
            if (wrapper) {
              wrapper.className = "ito-step" +
                (isDone ? " is-complete" : "") +
                (isRunning ? " is-active" : "") +
                (isFuture ? " is-future" : "");
            }

            var card = root.querySelector('[data-card="' + i + '"]');
            if (card) {
              card.className = "ito-step-card" +
                (isRunning ? " is-active" : "") +
                (isFuture ? " is-dim" : "") +
                (isDone && step.status === "fail" ? " is-fail" : "");
            }

            var iconSlot = root.querySelector('[data-icon="' + i + '"]');
            if (iconSlot) {
              var ni = stepIconHtml(step.actionType, stateStr);
              if (iconSlot.outerHTML !== ni) iconSlot.outerHTML = ni.replace(">", ' data-icon="' + i + '">');
            }

            var statusSlot = root.querySelector('[data-status="' + i + '"]');
            if (statusSlot) {
              if (isRunning) {
                statusSlot.innerHTML = "<span>running\u2026</span>";
              } else if (isDone) {
                statusSlot.innerHTML = "<span>" + esc(step.duration) + '</span> <span class="' + (step.status==="pass"?"is-pass":"is-fail") + '">' + esc(step.status) + "</span>";
              } else {
                statusSlot.innerHTML = "";
              }
            }

            /* Expand: show when running or done-but-not-complete.
               In complete state, collapse everything. */
            var expandSlot = root.querySelector('[data-expand="' + i + '"]');
            if (expandSlot) {
              var showExpand = !isComplete && (isDone || isRunning);
              if (showExpand && !expandSlot.hasChildNodes()) {
                expandSlot.innerHTML = '<div class="ito-step-expand">' +
                  shotsHtml(step.shots, isDone, step.status === "fail") +
                  '<pre class="ito-code"><code>' + esc(step.codeSnippet) + "</code></pre></div>";
              } else if (!showExpand && expandSlot.hasChildNodes()) {
                expandSlot.innerHTML = "";
              }
            }

            /* Report */
            var reportRow = root.querySelector('[data-report="' + i + '"]');
            if (reportRow) {
              reportRow.className = "ito-report-row" +
                (isRunning ? " is-current" : "") +
                (isFuture ? " is-muted" : "");
            }

            var ricon = root.querySelector('[data-ricon="' + i + '"]');
            if (ricon) {
              if (isRunning) {
                ricon.className = "ito-mini active";
                ricon.textContent = "";
              } else if (isDone && step.status === "pass") {
                ricon.className = "ito-mini pass";
                ricon.textContent = "\u2713";
              } else if (isDone && step.status === "fail") {
                ricon.className = "ito-mini fail";
                ricon.textContent = "\u2715";
              } else {
                ricon.className = "ito-mini";
                ricon.textContent = "";
              }
            }

            var rright = root.querySelector('[data-rright="' + i + '"]');
            if (rright) {
              if (isDone) {
                rright.innerHTML = "<span>" + esc(step.duration) + '</span> <span class="' + (step.status==="pass"?"is-pass":"is-fail") + '">' + esc(step.status) + "</span>";
              } else {
                rright.innerHTML = "";
              }
            }
          }
        }

        /* ━━━━━ HELPERS ━━━━━ */

        function updateScale(root) {
          var shell = root.querySelector(".ito-stage-shell");
          var wrap = root.querySelector("[data-ito-scale-wrap]");
          var stage = root.querySelector("[data-ito-scale-stage]");
          if (!shell || !wrap || !stage) return;
          shell.style.padding = getShellPadding() + "px";
          var avail = Math.max(320, wrap.clientWidth);
          var scale = Math.min(1, avail / BASE_WIDTH);
          stage.style.transform = "scale(" + scale + ")";
          wrap.style.height = Math.round(BASE_HEIGHT * scale) + "px";
        }

        function updateTimelinePosition(root, forceTop) {
          var viewport = root.querySelector("[data-timeline-viewport]");
          var track = root.querySelector("[data-timeline-track]");
          if (!viewport || !track) return;

          if (forceTop) {
            track.style.transform = "translateY(0px)";
            return;
          }

          var active = root.querySelector(".ito-step.is-active");
          if (!active) {
            track.style.transform = "translateY(0px)";
            return;
          }

          var vh = viewport.clientHeight;
          var target = Math.max(0, active.offsetTop - vh * 0.22);
          var maxY = Math.max(0, track.scrollHeight - vh);
          track.style.transform = "translateY(-" + Math.min(target, maxY) + "px)";
        }

        function preventScroll(root) {
          function stop(e) { if (root.contains(e.target)) e.preventDefault(); }
          root._itoStop = stop;
          root.addEventListener("wheel", stop, { passive: false });
          root.addEventListener("touchmove", stop, { passive: false });
        }

        /* ━━━━━ LIFECYCLE ━━━━━ */

        function cleanup(root) {
          if (!root) return;
          if (root._itoClean) root._itoClean();
          if (root._itoStop) {
            root.removeEventListener("wheel", root._itoStop);
            root.removeEventListener("touchmove", root._itoStop);
          }
          if (root._itoResize) window.removeEventListener("resize", root._itoResize);
          if (root._itoRO) root._itoRO.disconnect();
        }

        /* Animation state machine:
           stepIndex 0 → STEPS.length-1: each step running
           stepIndex STEPS.length: "complete" state (all collapsed, scroll to top)
           Then after COMPLETE_PAUSE → reset to 0
        */

        function startAnimation(root) {
          var stepIndex = 0;
          var intervalId = null;
          var completeTimeoutId = null;
          var restartTimeoutId = null;
          var restarting = false;

          root.innerHTML = buildShell();
          updateState(root, 0);
          updateScale(root);
          updateTimelinePosition(root, false);

          function scheduleScroll(forceTop) {
            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                updateTimelinePosition(root, forceTop);
              });
            });
          }

          function tick() {
            stepIndex++;

            if (stepIndex <= STEPS.length - 1) {
              updateState(root, stepIndex);
              scheduleScroll(false);
            } else if (stepIndex === STEPS.length) {
              /* Last step finished → collapse to summary */
              clearInterval(intervalId);
              updateState(root, STEPS.length);

              /* Slide-up effect:
                 1) Disable transition, push track below viewport
                 2) Re-enable transition, animate to translateY(0) */
              var track = root.querySelector("[data-timeline-track]");
              var viewport = root.querySelector("[data-timeline-viewport]");
              if (track && viewport) {
                var vh = viewport.clientHeight;
                track.style.transition = "none";
                track.style.transform = "translateY(" + vh + "px)";
                /* Force reflow so the jump takes effect before re-enabling transition */
                track.offsetHeight;
                track.style.transition = "";
                requestAnimationFrame(function () {
                  track.style.transform = "translateY(0px)";
                });
              }

              completeTimeoutId = setTimeout(function () {
                restart();
              }, COMPLETE_PAUSE);
            }
          }

          function startLoop() {
            clearInterval(intervalId);
            intervalId = setInterval(tick, STEP_INTERVAL);
          }

          function restart() {
            if (restarting) return;
            restarting = true;
            clearInterval(intervalId);
            clearTimeout(completeTimeoutId);
            clearTimeout(restartTimeoutId);

            stepIndex = 0;
            updateState(root, 0);
            scheduleScroll(false);

            restartTimeoutId = setTimeout(function () {
              startLoop();
              restarting = false;
            }, RESTART_DELAY);
          }

          root.addEventListener("click", function (e) {
            if (e.target.closest(".ito-rerun-btn")) restart();
          });

          startLoop();

          root._itoClean = function () {
            clearInterval(intervalId);
            clearTimeout(completeTimeoutId);
            clearTimeout(restartTimeoutId);
          };
        }

        function mount() {
          var root = document.getElementById("root");
          if (!root) return;
          cleanup(root);
          preventScroll(root);
          startAnimation(root);

          root._itoResize = function () {
            updateScale(root);
            updateTimelinePosition(root, false);
          };
          window.addEventListener("resize", root._itoResize, { passive: true });
          if ("ResizeObserver" in window) {
            root._itoRO = new ResizeObserver(root._itoResize);
            root._itoRO.observe(root);
          }
          updateScale(root);
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", mount);
        } else {
          mount();
        }
      })();
    </script>
  </body>
</html>
