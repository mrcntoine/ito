<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Ito QA Hero Animation</title>

    <style>
     @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

:root {
  --bg: #f8f8f8;
  --surface: #ffffff;
  --surface-alt: #fcfcfc;
  --text: #141414;
  --text-soft: #666666;
  --text-muted: #888888;
  --border: #e7e7e7;
  --border-soft: #efefef;
  --border-softer: #f1f1f1;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --radius-xl: 20px;
  --radius-lg: 16px;
  --radius-md: 14px;
  --radius-sm: 12px;
  --ease-apple: cubic-bezier(0.22, 1, 0.36, 1);
  --font-body: "Inter", Arial, Helvetica, sans-serif;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  min-height: 100%;
  margin: 0;
  padding: 0;
  background: var(--bg);
}

body {
  color: var(--text);
  font-family: var(--font-body);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button {
  font: inherit;
  color: inherit;
}

#root {
  width: 100%;
}

.ito-stage-shell {
  width: 100%;
  padding: 24px;
  background: var(--bg);
  overflow: hidden;
}

.ito-scale-wrap {
  width: 100%;
  max-width: 1280px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

.ito-scale-stage {
  width: 1280px;
  height: 760px;
  transform-origin: top left;
  will-change: transform;
}

.ito-hero-frame {
  width: 1280px;
  height: 760px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  overflow: hidden;
}

.ito-hero-topbar,
.ito-hero-bottombar {
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 18px;
  background: var(--surface-alt);
  font-size: 11px;
  line-height: 1;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-soft);
}

.ito-hero-topbar {
  border-bottom: 1px solid var(--border-soft);
}

.ito-hero-bottombar {
  border-top: 1px solid var(--border-soft);
}

.ito-kicker {
  font-weight: 600;
  color: #111;
}

.ito-live,
.ito-connected,
.ito-status-left,
.ito-run-meta,
.ito-bottom-right,
.ito-col-head,
.ito-col-head-split,
.ito-head-progress,
.ito-pr-meta,
.ito-pr-footer,
.ito-step-top,
.ito-step-title-wrap,
.ito-step-status,
.ito-report-row,
.ito-report-left,
.ito-report-right,
.ito-report-summary-top,
.ito-report-summary-bottom,
.ito-metrics {
  display: flex;
  align-items: center;
}

.ito-live,
.ito-connected,
.ito-status-left,
.ito-run-meta,
.ito-bottom-right {
  gap: 8px;
}

.ito-live-dot,
.ito-connected i {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
  flex: 0 0 auto;
}

.ito-hero-grid {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr) 280px;
  height: calc(760px - 104px);
  min-height: 0;
}

.ito-col {
  min-width: 0;
  min-height: 0;
  padding: 18px;
  overflow: hidden;
}

.ito-col-left,
.ito-col-center {
  border-right: 1px solid var(--border-soft);
}

.ito-col-head,
.ito-col-head-split {
  justify-content: space-between;
  gap: 12px;
  margin: 0 0 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-soft);
  font-weight: 600;
}

.ito-head-progress {
  gap: 10px;
  font-size: 10px;
  color: var(--text-muted);
}

.ito-pr-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.ito-pr-card,
.ito-pr-skeleton {
  display: flex;
  gap: 12px;
  padding: 12px;
  border: 1px solid #ececec;
  border-radius: var(--radius-md);
  background: var(--surface);
}

.ito-pr-icon {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  background: #f3f3f3;
  color: #111;
  font-size: 15px;
  flex: 0 0 auto;
}

.ito-pr-body {
  min-width: 0;
  flex: 1;
}

.ito-pr-title {
  font-size: 13px;
  line-height: 1.35;
  font-weight: 600;
  color: #111;
}

.ito-pr-branch,
.ito-pr-meta,
.ito-pr-footer {
  font-size: 11px;
  color: #777;
}

.ito-pr-branch {
  margin-top: 2px;
}

.ito-pr-meta,
.ito-pr-footer {
  justify-content: space-between;
  gap: 10px;
  margin-top: 8px;
}

.ito-progress {
  position: relative;
  width: 100%;
  height: 6px;
  margin-top: 10px;
  border-radius: 999px;
  overflow: hidden;
  background: #f1f1f1;
}

.ito-progress > span {
  position: absolute;
  inset: 0 auto 0 0;
  width: 58%;
  border-radius: inherit;
  background: linear-gradient(90deg, #111 0%, #666 100%);
  transition: width 900ms var(--ease-apple);
}

.ito-progress-short {
  width: 84px;
  margin-top: 0;
}

.ito-pr-skeleton-dot {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: linear-gradient(90deg, #f1f1f1 25%, #fafafa 50%, #f1f1f1 75%);
  background-size: 200% 100%;
  animation: ito-shimmer 1.5s linear infinite;
  flex: 0 0 auto;
}

.ito-pr-skeleton-lines {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: center;
}

.ito-pr-skeleton-lines span {
  display: block;
  height: 10px;
  border-radius: 999px;
  background: linear-gradient(90deg, #f1f1f1 25%, #fafafa 50%, #f1f1f1 75%);
  background-size: 200% 100%;
  animation: ito-shimmer 1.5s linear infinite;
}

.ito-pr-skeleton-lines span:first-child {
  width: 65%;
}

.ito-pr-skeleton-lines span:last-child {
  width: 40%;
}

.ito-run-meta {
  margin-top: 14px;
  font-size: 11px;
  color: #777;
}

.ito-run-spinner,
.ito-spinner-ring,
.ito-step-icon-running::after {
  border-radius: 999px;
}

.ito-run-spinner {
  width: 10px;
  height: 10px;
  border: 2px solid #d8d8d8;
  border-top-color: #111;
  animation: ito-spin 1.1s linear infinite;
  flex: 0 0 auto;
}

.ito-center-main {
  display: flex;
  flex-direction: column;
  min-height: 100%;
  gap: 16px;
}

.ito-timeline-viewport {
  position: relative;
  flex: 1 1 auto;
  min-height: 0;
  overflow: hidden;
  overscroll-behavior: contain;
  padding-right: 2px;
}

.ito-timeline-track {
  display: flex;
  flex-direction: column;
  gap: 14px;
  transform: translateY(0);
  transition: transform 950ms var(--ease-apple);
  will-change: transform;
}

.ito-step {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr);
  gap: 12px;
  align-items: start;
}

.ito-step-rail {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100%;
}

.ito-step-dot {
  width: 14px;
  height: 14px;
  border-radius: 999px;
  background: #e7e7e7;
  border: 1px solid #d8d8d8;
  flex: 0 0 auto;
}

.ito-step-dot.is-pass,
.ito-step-dot.is-fail,
.ito-step-dot.is-active {
  display: grid;
  place-items: center;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  border: 0;
}

.ito-step-dot.is-pass {
  background: var(--green);
}

.ito-step-dot.is-fail {
  background: var(--red);
}

.ito-step-dot.is-active {
  background: #111;
  position: relative;
}

.ito-spinner-ring {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-top-color: #fff;
  animation: ito-spin 1.1s linear infinite;
}

.ito-step-line {
  width: 1px;
  flex: 1 1 auto;
  min-height: 42px;
  margin-top: 6px;
  background: #ececec;
  transition: background-color 600ms var(--ease-apple);
}

.ito-step-line.is-done {
  background: #cfcfcf;
}

.ito-step-card {
  border: 1px solid #ececec;
  border-radius: var(--radius-lg);
  padding: 14px;
  background: var(--surface);
  transform: translateY(0) scale(1);
  opacity: 1;
  transition:
    transform 700ms var(--ease-apple),
    opacity 700ms var(--ease-apple),
    border-color 700ms var(--ease-apple),
    background-color 700ms var(--ease-apple);
  will-change: transform, opacity;
}

.ito-step-card.is-active {
  border-color: #111;
  transform: translateY(-2px) scale(1.008);
}

.ito-step-card.is-dim {
  opacity: 0.42;
  transform: translateY(6px) scale(0.988);
}

.ito-step-card.is-fail {
  border-color: #fecaca;
  background: #fffafa;
}

.ito-step-top,
.ito-step-status,
.ito-report-row,
.ito-report-summary-top,
.ito-report-summary-bottom,
.ito-metrics {
  justify-content: space-between;
  gap: 10px;
}

.ito-step-title-wrap,
.ito-report-left {
  justify-content: flex-start;
  gap: 10px;
  min-width: 0;
}

.ito-step-icon,
.ito-mini {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: #f1f1f1;
  color: #666;
  font-size: 11px;
  flex: 0 0 auto;
}

.ito-step-icon.is-pass,
.ito-mini.pass {
  background: var(--green-bg);
  color: var(--green);
}

.ito-step-icon.is-fail,
.ito-mini.fail {
  background: var(--red-bg);
  color: var(--red);
}

.ito-step-icon-running {
  background: #111;
  position: relative;
}

.ito-step-icon-running::after {
  content: "";
  width: 8px;
  height: 8px;
  border: 2px solid rgba(255, 255, 255, 0.25);
  border-top-color: #fff;
  animation: ito-spin 1s linear infinite;
}

.ito-step-title {
  min-width: 0;
  font-size: 13px;
  line-height: 1.35;
  font-weight: 600;
  color: #111;
}

.ito-step-status {
  font-size: 11px;
  color: #777;
  flex: 0 0 auto;
}

.ito-step-status .is-pass,
.ito-report-right .is-pass,
.ito-metrics .is-pass {
  color: var(--green);
}

.ito-step-status .is-fail,
.ito-report-right .is-fail,
.ito-metrics .is-fail {
  color: var(--red);
}

.ito-step-sub {
  margin-top: 7px;
  font-size: 12px;
  line-height: 1.5;
  color: #666;
}

.ito-step-sub.is-error {
  color: #b91c1c;
}

.ito-step-expand {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-softer);
  animation: ito-fade-up 700ms var(--ease-apple);
  transform-origin: top center;
}

.ito-shot-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.ito-shot {
  width: 46px;
  height: 32px;
  border-radius: 9px;
  border: 1px solid rgba(0, 0, 0, 0.06);
  display: grid;
  place-items: center;
  position: relative;
  transition:
    transform 650ms var(--ease-apple),
    opacity 650ms var(--ease-apple);
}

.ito-step.is-active .ito-shot {
  transform: translateY(-1px);
}

.ito-shot.blue {
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
}

.ito-shot.green {
  background: linear-gradient(135deg, #dcfce7, #bbf7d0);
}

.ito-shot.red {
  background: linear-gradient(135deg, #fee2e2, #fecaca);
}

.ito-shot.purple {
  background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
}

.ito-shot.error {
  background: linear-gradient(135deg, #111111, #333333);
}

.ito-shot-error-label {
  font-size: 9px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #fff;
}

.ito-code {
  margin: 0;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid #f0f0f0;
  background: #fafafa;
  overflow: hidden;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 11px;
  line-height: 1.5;
  color: #333;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

.ito-statusbar {
  margin-top: 0;
  padding: 12px 14px;
  border: 1px solid #ececec;
  border-radius: var(--radius-md);
  background: var(--surface-alt);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 11px;
  color: #666;
  flex: 0 0 auto;
}

.ito-report-summary {
  padding: 14px;
  border: 1px solid #ececec;
  border-radius: var(--radius-lg);
  background: var(--surface-alt);
}

.ito-report-summary-top strong {
  font-size: 22px;
  line-height: 1;
  color: #111;
}

.ito-report-summary-top,
.ito-report-summary-bottom {
  font-size: 11px;
  color: #777;
}

.ito-report-summary-bottom {
  margin-top: 10px;
}

.ito-report-list {
  margin-top: 14px;
  border: 1px solid #ececec;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
}

.ito-report-row {
  justify-content: space-between;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-softer);
  transition:
    opacity 500ms var(--ease-apple),
    background-color 500ms var(--ease-apple),
    transform 500ms var(--ease-apple);
}

.ito-report-row:last-child {
  border-bottom: 0;
}

.ito-report-row.is-muted {
  opacity: 0.45;
  transform: translateY(2px);
}

.ito-report-row.is-current {
  background: var(--surface-alt);
  transform: translateY(-1px);
}

.ito-report-left,
.ito-report-right {
  gap: 10px;
  font-size: 12px;
  color: #555;
}

.ito-report-footer {
  margin-top: 14px;
  padding-top: 2px;
}

.ito-metrics {
  border: 1px solid #ececec;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
}

.ito-metrics > div {
  flex: 1 1 0;
  padding: 14px 12px;
  text-align: center;
}

.ito-metrics > div.is-bordered {
  border-left: 1px solid var(--border-soft);
  border-right: 1px solid var(--border-soft);
}

.ito-metrics p {
  margin: 0 0 4px;
  font-size: 11px;
  color: #777;
}

.ito-metrics strong {
  font-size: 18px;
  line-height: 1;
  color: #111;
}

.ito-rerun-btn {
  width: 100%;
  margin-top: 14px;
  border: 0;
  border-radius: var(--radius-md);
  padding: 12px 14px;
  background: #111;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition:
    transform 500ms var(--ease-apple),
    opacity 500ms var(--ease-apple);
}

.ito-rerun-btn:hover {
  opacity: 0.96;
  transform: translateY(-1px);
}

.ito-rerun-btn:active {
  transform: translateY(0);
}

@keyframes ito-spin {
  to {
    transform: rotate(360deg);
  }
}

@keyframes ito-shimmer {
  0% {
    background-position: 200% 0;
  }
  100% {
    background-position: -200% 0;
  }
}

@keyframes ito-fade-up {
  0% {
    opacity: 0;
    transform: translateY(10px) scale(0.985);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@media (max-width: 991px) {
  .ito-stage-shell {
    padding: 16px;
  }
}

@media (max-width: 767px) {
  .ito-stage-shell {
    padding: 12px;
  }
}

@media (max-width: 479px) {
  .ito-hero-topbar,
  .ito-hero-bottombar {
    padding: 12px 16px;
  }

  .ito-col {
    padding: 16px;
  }

  .ito-center-main {
    gap: 14px;
  }

  .ito-report-footer {
    margin-top: 12px;
  }

  .ito-metrics > div {
    padding: 12px 10px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .ito-progress > span,
  .ito-timeline-track,
  .ito-step-card,
  .ito-shot,
  .ito-report-row,
  .ito-rerun-btn {
    transition-duration: 0ms !important;
    animation-duration: 0ms !important;
  }
}

  <body>
    <div id="root"></div>

    <script>
      (function () {
        document.documentElement.classList.remove("dark");

        const BASE_WIDTH = 1280;
        const BASE_HEIGHT = 760;
        const SHELL_PADDING_DESKTOP = 24;
        const SHELL_PADDING_TABLET = 16;
        const SHELL_PADDING_MOBILE = 12;
        const STEP_INTERVAL = 3400;
        const RESTART_DELAY = 450;

        const STEPS = [
          {
            id: "s1",
            label: "Authentication flow",
            status: "pass",
            duration: "1.2s",
            actionType: "type",
            actionDetail: 'agent.fill("#email", "user@test.com") → submit',
            codeSnippet: `await page.fill('[data-id="email"]', 'user@test.com');
await page.click('button[type="submit"]');`,
            shots: ["blue", "blue", "blue"],
          },
          {
            id: "s2",
            label: "Cart state management",
            status: "pass",
            duration: "0.8s",
            actionType: "assert",
            actionDetail: "expect(cart.items).toHaveLength(3)",
            codeSnippet: `const items = await page.$$eval('.cart-item', els => els.length);
expect(items).toBe(3);`,
            shots: ["green", "green"],
          },
          {
            id: "s3",
            label: "Checkout - payment step",
            status: "fail",
            duration: "3.4s",
            actionType: "error",
            actionDetail:
              'TimeoutError: element "#card-frame" not found after 3000ms',
            codeSnippet: `// Error: Stripe iframe did not mount
await page.waitForSelector('#card-frame', { timeout: 3000 });
// → TimeoutError thrown`,
            shots: ["red", "red", "error"],
          },
          {
            id: "s4",
            label: "Confirmation email",
            status: "pass",
            duration: "1.1s",
            actionType: "snapshot",
            actionDetail: 'snapshot("confirmation") → diff 0px',
            codeSnippet: `await expect(page).toHaveScreenshot(
  'confirmation.png',
  { maxDiffPixels: 0 }
);`,
            shots: ["purple", "purple"],
          },
        ];

        const PULL_REQUESTS = [
          {
            id: "pr-247",
            branch: "feat/analytics-v2",
            title: "Add analytics dashboard",
            sha: "a3f8c1d",
            filesChanged: 12,
          },
          {
            id: "pr-251",
            branch: "fix/checkout-safari",
            title: "Fix checkout regression",
            sha: "b9e2d4a",
            filesChanged: 3,
          },
        ];

        function escapeHtml(value) {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function getShellPadding() {
          const width =
            window.innerWidth || document.documentElement.clientWidth || 0;
          if (width <= 767) return SHELL_PADDING_MOBILE;
          if (width <= 991) return SHELL_PADDING_TABLET;
          return SHELL_PADDING_DESKTOP;
        }

        function getStepIcon(type, state) {
          if (state === "running") {
            return `<span class="ito-step-icon ito-step-icon-running"></span>`;
          }

          if (state === "done" && type === "error") {
            return `<span class="ito-step-icon is-fail">⚠</span>`;
          }

          if (state === "done") {
            return `<span class="ito-step-icon is-pass">✓</span>`;
          }

          switch (type) {
            case "type":
              return `<span class="ito-step-icon">⌨</span>`;
            case "assert":
              return `<span class="ito-step-icon">✓</span>`;
            case "error":
              return `<span class="ito-step-icon">⚠</span>`;
            case "snapshot":
              return `<span class="ito-step-icon">▣</span>`;
            default:
              return `<span class="ito-step-icon">•</span>`;
          }
        }

        function getStepRail(state, status, isLast) {
          let dot = `<div class="ito-step-dot"></div>`;

          if (state === "running") {
            dot = `
              <div class="ito-step-dot is-active">
                <span class="ito-spinner-ring"></span>
              </div>
            `;
          } else if (state === "done" && status === "pass") {
            dot = `<div class="ito-step-dot is-pass">✓</div>`;
          } else if (state === "done" && status === "fail") {
            dot = `<div class="ito-step-dot is-fail">✕</div>`;
          }

          return `
            <div class="ito-step-rail">
              ${dot}
              ${
                isLast
                  ? ""
                  : `<div class="ito-step-line ${
                      state === "done" ? "is-done" : ""
                    }"></div>`
              }
            </div>
          `;
        }

        function getShotsHtml(shots, isDone, isFail) {
          return `
            <div class="ito-shot-row">
              ${shots
                .map(function (shot) {
                  const errorLabel =
                    shot === "error" && isFail
                      ? `<span class="ito-shot-error-label">ERR</span>`
                      : "";
                  return `<span class="ito-shot ${shot} ${
                    isDone ? "is-done" : ""
                  }">${errorLabel}</span>`;
                })
                .join("")}
            </div>
          `;
        }

        function renderPullRequests() {
          return PULL_REQUESTS.map(function (pr) {
            return `
              <article class="ito-pr-card">
                <div class="ito-pr-icon">⎇</div>
                <div class="ito-pr-body">
                  <div class="ito-pr-title">${escapeHtml(pr.title)}</div>
                  <div class="ito-pr-branch">${escapeHtml(pr.branch)}</div>
                  <div class="ito-pr-meta">
                    <span>#${escapeHtml(pr.id.replace("pr-", ""))}</span>
                    <span>${pr.filesChanged} files</span>
                  </div>
                  <div class="ito-progress"><span></span></div>
                  <div class="ito-pr-footer">
                    <span>${escapeHtml(pr.sha)}</span>
                    <span>checking…</span>
                  </div>
                </div>
              </article>
            `;
          }).join("");
        }

        function renderTimeline(activeIndex) {
          return STEPS.map(function (step, index) {
            const isLast = index === STEPS.length - 1;
            const isDone = activeIndex > index;
            const isRunning = activeIndex === index;
            const isFuture = activeIndex < index;

            const cardClass = [
              "ito-step-card",
              isRunning ? "is-active" : "",
              isFuture ? "is-dim" : "",
              isDone && step.status === "fail" ? "is-fail" : "",
            ]
              .filter(Boolean)
              .join(" ");

            const wrapperClass = [
              "ito-step",
              isDone ? "is-complete" : "",
              isRunning ? "is-active" : "",
              isFuture ? "is-future" : "",
            ]
              .filter(Boolean)
              .join(" ");

            const showExpanded = isDone || isRunning;
            const rightStatus = isRunning
              ? `<span>running…</span>`
              : isDone
              ? `
                  <span>${escapeHtml(step.duration)}</span>
                  <span class="${
                    step.status === "pass" ? "is-pass" : "is-fail"
                  }">${escapeHtml(step.status)}</span>
                `
              : "";

            return `
              <article class="${wrapperClass}" data-step-index="${index}">
                ${getStepRail(
                  isRunning ? "running" : isDone ? "done" : "idle",
                  step.status,
                  isLast
                )}
                <div class="${cardClass}">
                  <div class="ito-step-top">
                    <div class="ito-step-title-wrap">
                      ${getStepIcon(
                        step.actionType,
                        isRunning ? "running" : isDone ? "done" : "idle"
                      )}
                      <span class="ito-step-title">${escapeHtml(
                        step.label
                      )}</span>
                    </div>
                    <div class="ito-step-status">${rightStatus}</div>
                  </div>

                  <div class="ito-step-sub ${
                    step.status === "fail" ? "is-error" : ""
                  }">
                    ${escapeHtml(step.actionDetail)}
                  </div>

                  ${
                    showExpanded
                      ? `
                        <div class="ito-step-expand">
                          ${getShotsHtml(
                            step.shots,
                            isDone,
                            step.status === "fail"
                          )}
                          <pre class="ito-code"><code>${escapeHtml(
                            step.codeSnippet
                          )}</code></pre>
                        </div>
                      `
                      : ""
                  }
                </div>
              </article>
            `;
          }).join("");
        }

        function renderReport(activeIndex) {
          return STEPS.map(function (step, index) {
            const isDone = activeIndex > index;
            const isRunning = activeIndex === index;
            const isFuture = activeIndex < index;

            const rowClass = [
              "ito-report-row",
              isRunning ? "is-current" : "",
              isFuture ? "is-muted" : "",
            ]
              .filter(Boolean)
              .join(" ");

            const leftIcon = isRunning
              ? `<span class="ito-mini active"></span>`
              : isDone && step.status === "pass"
              ? `<span class="ito-mini pass">✓</span>`
              : isDone && step.status === "fail"
              ? `<span class="ito-mini fail">✕</span>`
              : `<span class="ito-mini"></span>`;

            const right = isDone
              ? `
                <div class="ito-report-right">
                  <span>${escapeHtml(step.duration)}</span>
                  <span class="${
                    step.status === "pass" ? "is-pass" : "is-fail"
                  }">${escapeHtml(step.status)}</span>
                </div>
              `
              : "";

            return `
              <div class="${rowClass}">
                <div class="ito-report-left">
                  ${leftIcon}
                  <span>${escapeHtml(step.label)}</span>
                </div>
                ${right}
              </div>
            `;
          }).join("");
        }

        function renderHero(stepIndex) {
          const safeIndex = Math.max(0, Math.min(stepIndex, STEPS.length));
          const progress = Math.max(
            0,
            Math.min(Math.round((safeIndex / STEPS.length) * 100), 100)
          );

          const runningLabel =
            safeIndex === 0
              ? "Initialising…"
              : safeIndex <= STEPS.length
              ? "Executing: " +
                STEPS[Math.min(safeIndex - 1, STEPS.length - 1)].label
              : "Run complete";

          return `
            <section class="ito-stage-shell">
              <div class="ito-scale-wrap" data-ito-scale-wrap>
                <div class="ito-scale-stage" data-ito-scale-stage>
                  <div class="ito-hero-frame">
                    <div class="ito-hero-topbar">
                      <span class="ito-kicker">Automated QA</span>
                      <div class="ito-live">
                        <span class="ito-live-dot"></span>
                        <span>Live</span>
                      </div>
                    </div>

                    <div class="ito-hero-grid">
                      <aside class="ito-col ito-col-left">
                        <div class="ito-col-head">Pull Requests</div>

                        <div class="ito-pr-list">
                          ${renderPullRequests()}
                          <article class="ito-pr-skeleton">
                            <div class="ito-pr-skeleton-dot"></div>
                            <div class="ito-pr-skeleton-lines">
                              <span></span>
                              <span></span>
                            </div>
                          </article>
                        </div>

                        <div class="ito-run-meta">
                          <span class="ito-run-spinner"></span>
                          <span>ito-agent · run #88241</span>
                        </div>
                      </aside>

                      <main class="ito-col ito-col-center">
                        <div class="ito-center-main">
                          <div class="ito-col-head ito-col-head-split">
                            <span>Agent Timeline</span>
                            <div class="ito-head-progress">
                              <span>step ${Math.min(
                                Math.max(safeIndex, 1),
                                STEPS.length
                              )}/${STEPS.length}</span>
                              <div class="ito-progress ito-progress-short">
                                <span style="width:${progress}%"></span>
                              </div>
                            </div>
                          </div>

                          <div
                            class="ito-timeline-viewport"
                            data-timeline-viewport
                          >
                            <div class="ito-timeline-track" data-timeline-track>
                              ${renderTimeline(safeIndex)}
                            </div>
                          </div>

                          <div class="ito-statusbar">
                            <div class="ito-status-left">
                              <span class="ito-run-spinner"></span>
                              <span>${escapeHtml(runningLabel)}</span>
                            </div>
                            <span>ito-agent</span>
                          </div>
                        </div>
                      </main>

                      <aside class="ito-col ito-col-right">
                        <div class="ito-col-head">QA Report</div>

                        <div class="ito-report-summary">
                          <div class="ito-report-summary-top">
                            <span>Coverage</span>
                            <strong>${progress}%</strong>
                          </div>

                          <div class="ito-progress">
                            <span style="width:${progress}%"></span>
                          </div>

                          <div class="ito-report-summary-bottom">
                            <span>#run-88241</span>
                            <span>${safeIndex > 0 ? safeIndex * 2 + "s" : "—"}</span>
                          </div>
                        </div>

                        <div class="ito-report-list">
                          ${renderReport(safeIndex)}
                        </div>

                        <div class="ito-report-footer">
                          <div class="ito-metrics">
                            <div>
                              <p>Total</p>
                              <strong>${STEPS.length}</strong>
                            </div>
                            <div class="is-bordered">
                              <p>Passed</p>
                              <strong class="is-pass">${
                                STEPS.filter(function (s) {
                                  return s.status === "pass";
                                }).length
                              }</strong>
                            </div>
                            <div>
                              <p>Failed</p>
                              <strong class="is-fail">${
                                STEPS.filter(function (s) {
                                  return s.status === "fail";
                                }).length
                              }</strong>
                            </div>
                          </div>

                          <button class="ito-rerun-btn" type="button">
                            Re-run suite
                          </button>
                        </div>
                      </aside>
                    </div>

                    <div class="ito-hero-bottombar">
                      <span>ito · qa engine</span>
                      <div class="ito-bottom-right">
                        <span>2 PRs · 4 tests · 1 failure</span>
                        <span class="ito-connected"><i></i>Connected</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          `;
        }

        function updateScale(root) {
          const shell = root.querySelector(".ito-stage-shell");
          const wrap = root.querySelector("[data-ito-scale-wrap]");
          const stage = root.querySelector("[data-ito-scale-stage]");

          if (!shell || !wrap || !stage) return;

          const padding = getShellPadding();
          shell.style.padding = padding + "px";

          const availableWidth = Math.max(320, wrap.clientWidth);
          const scale = Math.min(1, availableWidth / BASE_WIDTH);
          const scaledHeight = Math.round(BASE_HEIGHT * scale);

          stage.style.transform = "scale(" + scale + ")";
          wrap.style.height = scaledHeight + "px";
        }

        function updateTimelinePosition(root) {
          const viewport = root.querySelector("[data-timeline-viewport]");
          const track = root.querySelector("[data-timeline-track]");
          const active = root.querySelector(".ito-step.is-active");

          if (!viewport || !track) return;

          if (!active) {
            track.style.transform = "translateY(0px)";
            return;
          }

          const viewportHeight = viewport.clientHeight;
          const activeTop = active.offsetTop;
          const activeHeight = active.offsetHeight;
          const activeCenter = activeTop + activeHeight / 2;
          const targetY = Math.max(0, activeCenter - viewportHeight / 2);
          const maxY = Math.max(0, track.scrollHeight - viewportHeight);
          const clampedY = Math.min(targetY, maxY);

          track.style.transform = "translateY(-" + clampedY + "px)";
        }

        function preventUserScrollInside(root) {
          function stopEvent(event) {
            if (!event.target || !root.contains(event.target)) return;
            event.preventDefault();
          }

          root.__itoStopScroll = stopEvent;
          root.addEventListener("wheel", stopEvent, { passive: false });
          root.addEventListener("touchmove", stopEvent, { passive: false });
        }

        function cleanup(root) {
          if (!root) return;

          if (typeof root.__itoCleanup === "function") {
            root.__itoCleanup();
          }

          if (root.__itoStopScroll) {
            root.removeEventListener("wheel", root.__itoStopScroll);
            root.removeEventListener("touchmove", root.__itoStopScroll);
            root.__itoStopScroll = null;
          }

          if (root.__itoResizeHandler) {
            window.removeEventListener("resize", root.__itoResizeHandler);
            root.__itoResizeHandler = null;
          }

          if (root.__itoResizeObserver) {
            root.__itoResizeObserver.disconnect();
            root.__itoResizeObserver = null;
          }
        }

        function startHeroAnimation(root) {
          let stepIndex = 0;
          let intervalId = null;
          let restartTimeoutId = null;
          let isRestarting = false;

          function render() {
            root.innerHTML = renderHero(stepIndex);
            updateScale(root);
            updateTimelinePosition(root);
          }

          function startLoop() {
            clearInterval(intervalId);
            intervalId = setInterval(function () {
              stepIndex = (stepIndex + 1) % (STEPS.length + 2);
              render();
            }, STEP_INTERVAL);
          }

          function restart() {
            if (isRestarting) return;
            isRestarting = true;

            clearInterval(intervalId);
            clearTimeout(restartTimeoutId);

            stepIndex = 0;
            render();

            restartTimeoutId = setTimeout(function () {
              startLoop();
              isRestarting = false;
            }, RESTART_DELAY);
          }

          root.addEventListener("click", function (event) {
            const button = event.target.closest(".ito-rerun-btn");
            if (!button) return;
            restart();
          });

          render();
          startLoop();

          root.__itoCleanup = function () {
            clearInterval(intervalId);
            clearTimeout(restartTimeoutId);
          };
        }

        function mountHero() {
          const root = document.getElementById("root");
          if (!root) return;

          cleanup(root);
          preventUserScrollInside(root);
          startHeroAnimation(root);

          root.__itoResizeHandler = function () {
            updateScale(root);
            updateTimelinePosition(root);
          };

          window.addEventListener("resize", root.__itoResizeHandler, {
            passive: true,
          });

          if ("ResizeObserver" in window) {
            root.__itoResizeObserver = new ResizeObserver(function () {
              updateScale(root);
              updateTimelinePosition(root);
            });
            root.__itoResizeObserver.observe(root);
          }

          updateScale(root);
          updateTimelinePosition(root);
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", mountHero);
        } else {
          mountHero();
        }
      })();
    </script>
  </body>
</html>
